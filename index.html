<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQC Mídia Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        .dark-scroll::-webkit-scrollbar-thumb { background: #29292e; border-radius: 10px; }
        .light-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#121214] text-white transition-colors duration-300" id="corpo-sistema">

    <!-- PAINEL DO OPERADOR -->
    <div id="painel-operador" class="block">
        <header id="header-operador" class="px-6 py-3 flex justify-between items-center border-b bg-[#1f1f23] border-[#29292e] shadow-sm">
            <div class="flex items-center gap-3">
                <div id="led-hdmi" class="w-3 h-3 rounded-full bg-amber-500"></div>
                <h1 class="font-bold text-md tracking-wide uppercase">AQC Mídia Pro</h1>
                <span id="status-hdmi" class="text-xs opacity-60">| Projetor HDMI: DESCONECTADO</span>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="abrirProjetor()" class="px-4 py-1.5 rounded-lg text-xs font-semibold bg-emerald-600 hover:bg-emerald-500 text-white shadow-lg transition-all cursor-pointer">
                    📺 Abrir Projetor
                </button>
                <button onclick="alternarTema()" id="btn-tema" class="p-1.5 rounded-xl border bg-[#29292e] border-[#3e3e44] text-xs cursor-pointer">
                    ☀️ Modo Claro
                </button>
            </div>
        </header>

        <main class="grid grid-cols-12 gap-4 p-4 h-[calc(100vh-65px)]">
            
            <!-- COLUNA 1: SELETOR BÍBLIA ESTILO HOLYRICS (4 COLUNAS) -->
            <section id="col1" class="col-span-4 rounded-2xl p-4 border bg-[#1f1f23] border-[#29292e] flex flex-col gap-3 overflow-hidden">
                <div class="text-xs font-bold text-gray-400 uppercase tracking-wider flex justify-between items-center">
                    <span>📖 Painel Go To Bible</span>
                    <select id="seletor-versao" class="bg-[#121214] border border-[#29292e] text-[11px] px-1.5 py-0.5 rounded text-emerald-400 focus:outline-none">
                        <option value="NVI">NVI</option>
                        <option value="ARC">ARC</option>
                    </select>
                </div>

                <!-- 1. GRADE DE LIVROS (Cores Clássicas do Holyrics) -->
                <div class="grid grid-cols-4 gap-1.5 text-[11px] font-bold">
                    <button onclick="selecionarLivro('Gn', 'Gênesis', 'bg-amber-700')" class="p-1.5 rounded bg-amber-800 hover:bg-amber-700 transition-all text-center">Gn</button>
                    <button onclick="selecionarLivro('Ex', 'Êxodo', 'bg-amber-700')" class="p-1.5 rounded bg-amber-800 hover:bg-amber-700 transition-all text-center">Ex</button>
                    <button onclick="selecionarLivro('Sl', 'Salmos', 'bg-purple-800')" class="p-1.5 rounded bg-purple-900 hover:bg-purple-800 transition-all text-center">Sl</button>
                    <button onclick="selecionarLivro('Pv', 'Provérbios', 'bg-purple-800')" class="p-1.5 rounded bg-purple-900 hover:bg-purple-800 transition-all text-center">Pv</button>
                    <button onclick="selecionarLivro('Mt', 'Mateus', 'bg-sky-800')" class="p-1.5 rounded bg-sky-900 hover:bg-sky-800 transition-all text-center">Mt</button>
                    <button onclick="selecionarLivro('Mc', 'Marcos', 'bg-sky-800')" class="p-1.5 rounded bg-sky-900 hover:bg-sky-800 transition-all text-center">Mc</button>
                    <button onclick="selecionarLivro('Jo', 'João', 'bg-blue-800')" class="p-1.5 rounded bg-blue-900 hover:bg-blue-800 transition-all text-center">Jo</button>
                    <button onclick="selecionarLivro('At', 'Atos', 'bg-blue-800')" class="p-1.5 rounded bg-blue-900 hover:bg-blue-800 transition-all text-center">At</button>
                    <button onclick="selecionarLivro('Rm', 'Romanos', 'bg-emerald-800')" class="p-1.5 rounded bg-emerald-900 hover:bg-emerald-800 transition-all text-center">Rm</button>
                    <button onclick="selecionarLivro('Ef', 'Efésios', 'bg-emerald-800')" class="p-1.5 rounded bg-emerald-900 hover:bg-emerald-800 transition-all text-center">Ef</button>
                    <button onclick="selecionarLivro('Ap', 'Apocalipse', 'bg-lime-800')" class="p-1.5 rounded bg-lime-900 hover:bg-lime-800 transition-all text-center">Ap</button>
                    <button onclick="realizarBuscaPorTexto()" class="p-1.5 rounded bg-zinc-800 text-gray-300 hover:bg-zinc-700 text-center">Filtro 🔍</button>
                </div>

                <!-- Input complementar caso queira digitar por texto -->
                <input type="text" id="campo-busca" placeholder="Ou digite termo para busca geral..." class="w-full px-3 py-1.5 rounded-lg text-xs border bg-[#121214] border-[#29292e] text-white focus:outline-none">

                <!-- 2. GRADES DE CAPÍTULO E VERSÍCULO -->
                <div class="grid grid-cols-2 gap-3 border-t border-[#29292e] pt-2">
                    <div>
                        <span class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Capítulo</span>
                        <div class="grid grid-cols-4 gap-1 h-20 overflow-y-auto pr-0.5 dark-scroll text-[11px]" id="grid-capitulos">
                            <!-- Gerado via JS ao clicar no livro -->
                        </div>
                    </div>
                    <div>
                        <span class="text-[10px] uppercase font-bold text-gray-500 block mb-1">Versículo</span>
                        <div class="grid grid-cols-4 gap-1 h-20 overflow-y-auto pr-0.5 dark-scroll text-[11px]" id="grid-versiculos">
                            <!-- Gerado via JS ao clicar no capítulo -->
                        </div>
                    </div>
                </div>

                <!-- Lista rápida de resultados abaixo -->
                <div id="lista-resultados" class="flex-1 overflow-y-auto space-y-1.5 pr-1 text-xs dark-scroll border-t border-[#29292e] pt-2">
                    <div class="text-gray-500 text-center py-2">Selecione as opções acima para carregar passagens.</div>
                </div>
            </section>

            <!-- COLUNA 2: GERENCIADOR DE SLIDES CENTRAL (5 COLUNAS) -->
            <section id="col2" class="col-span-5 rounded-2xl p-4 border bg-[#1f1f23] border-[#29292e] flex flex-col gap-3">
                <div class="flex justify-between items-center border-b border-[#29292e] pb-1.5">
                    <div id="titulo-col2" class="text-xs font-bold text-emerald-400 uppercase tracking-wider">Nenhum Item Ativo</div>
                    <span class="text-[9px] bg-emerald-500/10 text-emerald-400 px-2 py-0.5 rounded font-mono">Setas ↑ ↓</span>
                </div>
                <div id="container-slides" class="flex-1 overflow-y-auto space-y-2 pr-1 dark-scroll flex flex-col justify-center items-center text-gray-500 text-xs text-center">
                    Clique em um conteúdo para desmembrar os slides de exibição aqui.
                </div>
            </section>

            <!-- COLUNA 3: CONTROLES E HISTÓRICO DE TEMAS DE LETRAS (3 COLUNAS) -->
            <section id="col3" class="col-span-3 flex flex-col gap-4 overflow-hidden">
                <!-- Botões de Blackout rápidos -->
                <div id="card-controles" class="rounded-2xl p-3 border bg-[#1f1f23] border-[#29292e] flex flex-col gap-2">
                    <div class="flex gap-2">
                        <button onclick="alternarF5(true)" class="flex-1 py-2 rounded-xl text-[11px] font-bold bg-amber-500/10 text-amber-500 border border-amber-500/20 hover:bg-amber-500/20">Alt+L (Limpar)</button>
                        <button onclick="alternarF6(true)" class="flex-1 py-2 rounded-xl text-[11px] font-bold bg-red-500/10 text-red-500 border border-red-500/20 hover:bg-red-500/20">Alt+B (Black)</button>
                        <button onclick="restaurarTelas()" class="p-2 rounded-xl text-[11px] bg-zinc-800 border border-zinc-700 text-gray-300 hover:bg-zinc-700">🔄</button>
                    </div>
                </div>

                <!-- BANCO DE TEMAS SALVOS (Estilo Painel de Temas do Holyrics) -->
                <div class="rounded-2xl p-3 border bg-[#1f1f23] border-[#29292e] flex-1 flex flex-col gap-2 overflow-hidden">
                    <div class="flex justify-between items-center border-b border-[#29292e] pb-1.5">
                        <span class="text-[11px] font-bold text-gray-400 uppercase tracking-wider">🎭 Temas de Letras</span>
                        <label class="text-[10px] text-emerald-400 font-bold hover:text-emerald-300 cursor-pointer">
                            + Adicionar
                            <input type="file" id="upload-fundo" accept="image/*" class="hidden" onchange="salvarNovoTema(this)">
                        </label>
                    </div>
                    
                    <!-- Grade vertical rolável de miniaturas de temas salvos -->
                    <div id="lista-temas" class="flex-1 overflow-y-auto grid grid-cols-2 gap-2 pr-1 dark-scroll">
                        <!-- Temas padrão iniciais -->
                        <div onclick="aplicarTemaFundo('')" class="aspect-video bg-zinc-950 rounded-lg border border-dashed border-zinc-700 flex items-center justify-center cursor-pointer hover:border-emerald-500 transition-all">
                            <span class="text-[9px] text-gray-500 font-bold uppercase">Preto Puro</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- TELA DE PROJEÇÃO SECUNDÁRIA (HDMI) -->
    <div id="tela-projecao" class="hidden w-full h-screen bg-black overflow-hidden relative flex items-center justify-center select-none">
        <div id="fundo-projetor" class="absolute inset-0 bg-cover bg-center transition-all duration-500 z-0"></div>
        <div id="texto-projetado" class="w-[85%] text-center font-bold px-8 transition-all duration-300 opacity-100 scale-100 z-10 whitespace-pre-line" style="font-size: clamp(1.8rem, 3.8vw, 3.5rem); color: #ffffff; text-shadow: 3px 3px 12px rgba(0,0,0,0.9); line-height: 1.4;"></div>
        <div id="camada-blackout" class="absolute inset-0 bg-black z-50 hidden"></div>
    </div>

    <script>
        const SUPABASE_URL = "https://eszhspqyvzjqencijfqa.supabase.co/rest/v1/";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzemhzcHF5dnpqcWVuY2lqZnFhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMzg5NTIsImV4cCI6MjA5NzcxNDk1Mn0.s3QRhYnDPAlYfdDkLY0Z6MXfgut7eSq5darr8vmFQKI";

        const canalProjecao = new BroadcastChannel('amor_que_cura_projection');
        let modoEscuro = true;
        let slidesAtivos = [];
        let indiceSlideAtivo = -1;

        // Estado do seletor Holyrics
        let livroSelecionadoSigla = '';
        let livroSelecionadoNome = '';

        const params = new URLSearchParams(window.location.search);
        const view = params.get('view');

        if (view === 'projection') {
            document.getElementById('painel-operador').className = 'hidden';
            document.getElementById('tela-projecao').className = 'flex w-full h-screen bg-black overflow-hidden relative items-center justify-center select-none';
            
            canalProjecao.onmessage = (evento) => {
                const { tipo, payload } = evento.data;
                const txtNode = document.getElementById('texto-projetado');
                const blkNode = document.getElementById('camada-blackout');
                const bgNode = document.getElementById('fundo-projetor');

                if (tipo === 'PROJETAR_TEXTO') { txtNode.innerText = payload.texto; txtNode.classList.remove('opacity-0', 'scale-95'); blkNode.classList.add('hidden'); }
                if (tipo === 'MUDAR_FUNDO') bgNode.style.backgroundImage = payload.imagem ? `url('${payload.imagem}')` : 'none';
                if (tipo === 'F5_TEXTO') payload.ativo ? txtNode.classList.add('opacity-0', 'scale-95') : txtNode.classList.remove('opacity-0', 'scale-95');
                if (tipo === 'F6_BLACKOUT') payload.ativo ? blkNode.classList.remove('hidden') : blkNode.classList.add('hidden');
                if (tipo === 'PING_TESTE') canalProjecao.postMessage({ tipo: 'PONG_TESTE' });
            };
            canalProjecao.postMessage({ tipo: 'PONG_TESTE' });
        } else {
            canalProjecao.onmessage = (evento) => {
                if (evento.data.tipo === 'PONG_TESTE') {
                    document.getElementById('status-hdmi').innerText = '| Projetor HDMI: CONECTADO ✨';
                    document.getElementById('led-hdmi').className = 'w-3 h-3 rounded-full bg-emerald-500 animate-pulse';
                }
            };
            setInterval(() => { canalProjecao.postMessage({ tipo: 'PING_TESTE' }); }, 1500);
            carregarTemasSalvos();
        }

        // 🟢 INTERFACE HOLYRICS: MAPEIA SELEÇÃO DE LIVRO
        function selecionarLivro(sigla, nome, corClasse) {
            livroSelecionadoSigla = sigla;
            livroSelecionadoNome = nome;
            
            // Renderiza 5 capítulos na grade padrão (pode expandir conforme banco)
            const capContainer = document.getElementById('grid-capitulos');
            capContainer.innerHTML = '';
            for(let i=1; i<=5; i++) {
                capContainer.innerHTML += `<button onclick="selecionarCapitulo(${i})" class="p-1 rounded bg-[#121214] border border-[#29292e] text-center hover:border-emerald-500 transition-all font-medium">${i}</button>`;
            }
            document.getElementById('grid-versiculos').innerHTML = '';
        }

        function selecionarCapitulo(cap) {
            // Ao clicar no capítulo, renderiza 10 versículos rápidos na grade
            const verContainer = document.getElementById('grid-versiculos');
            verContainer.innerHTML = '';
            for(let i=1; i<=10; i++) {
                verContainer.innerHTML += `<button onclick="buscarPassagemDireta(${cap}, ${i})" class="p-1 rounded bg-[#121214] border border-[#29292e] text-center hover:bg-emerald-500 text-white transition-all font-medium">${i}</button>`;
            }
        }

        // BUSCA DIRETA PELA GRADE DO HOLYRICS
        async function buscarPassagemDireta(cap, ver) {
            const versao = document.getElementById('seletor-versao').value;
            const lista = document.getElementById('lista-resultados');
            lista.innerHTML = '<div class="text-center text-gray-500 animate-pulse">Buscando...</div>';

            try {
                const url = `${SUPABASE_URL}biblias?versao=eq.${versao}&livro_sigla=eq.${livroSelecionadoSigla}&capitulo=eq.${cap}&versiculo=eq.${ver}&select=*`;
                const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const dados = await res.json();

                lista.innerHTML = '';
                if(dados.length === 0) {
                    lista.innerHTML = '<div class="text-gray-500 text-center">Versículo não encontrado na base.</div>';
                    // Fallback para teste caso o banco esteja limpo
                    carregarNoMeio(`${livroSelecionadoNome} ${cap}:${ver}`, [`[Modo de Teste] Texto completo simulado para o versículo de ${livroSelecionadoNome} capítulo ${cap} e versículo ${ver}.`]);
                    return;
                }

                dados.forEach(v => {
                    carregarNoMeio(`${v.livro_nome} ${v.capitulo}:${v.versiculo}`, [v.texto]);
                });
            } catch(e) {
                lista.innerHTML = '<div class="text-red-400 text-center">Erro ao conectar no Supabase.</div>';
            }
        }

        // BUSCA TEXTUAL SEGUNDA ETAPA
        async function realizarBuscaPorTexto() {
            const termo = document.getElementById('campo-busca').value.trim();
            if(!termo) return;
            const lista = document.getElementById('lista-resultados');
            lista.innerHTML = '<div class="text-center text-gray-500 animate-pulse">Buscando termo...</div>';

            try {
                const url = `${SUPABASE_URL}biblias?texto=ilike.*${encodeURIComponent(termo)}*&select=*&limit=10`;
                const res = await fetch(url, { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } });
                const dados = await res.json();
                lista.innerHTML = '';
                
                dados.forEach(v => {
                    const item = document.createElement('div');
                    item.className = "p-2 rounded bg-[#29292e]/40 border border-[#29292e] cursor-pointer hover:border-emerald-500 text-left";
                    item.onclick = () => carregarNoMeio(`${v.livro_nome} ${v.capitulo}:${v.versiculo}`, [v.texto]);
                    item.innerHTML = `<span class="font-bold text-emerald-400 block">${v.livro_sigla} ${v.capitulo}:${v.versiculo}</span><p class="opacity-80">${v.texto}</p>`;
                    lista.appendChild(item);
                });
            } catch(e) { lista.innerHTML = 'Erro.'; }
        }

        // 🎭 GERENCIADOR DE TEMAS SALVOS (HOLYRICS COMPLETO)
        function salvarNovoTema(input) {
            if (input.files && input.files[0]) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const arrayTemas = JSON.parse(localStorage.getItem('aqc_banco_temas') || '[]');
                    arrayTemas.push(e.target.result);
                    localStorage.setItem('aqc_banco_temas', JSON.stringify(arrayTemas));
                    carregarTemasSalvos();
                };
                leitor.readAsDataURL(input.files[0]);
            }
        }

        function carregarTemasSalvos() {
            const lista = document.getElementById('lista-temas');
            lista.innerHTML = `<div onclick="aplicarTemaFundo('')" class="aspect-video bg-zinc-950 rounded-lg border border-dashed border-zinc-700 flex items-center justify-center cursor-pointer hover:border-emerald-500 transition-all"><span class="text-[9px] text-gray-500 font-bold uppercase">Preto Puro</span></div>`;
            
            const arrayTemas = JSON.parse(localStorage.getItem('aqc_banco_temas') || '[]');
            arrayTemas.forEach((imgBase64, index) => {
                const item = document.createElement('div');
                item.className = "aspect-video rounded-lg bg-cover bg-center border border-zinc-800 cursor-pointer hover:border-emerald-500 transition-all relative group shadow-md";
                item.style.backgroundImage = `url('${imgBase64}')`;
                item.onclick = () => aplicarTemaFundo(imgBase64);
                item.innerHTML = `<span class="absolute bottom-1 left-1 text-[8px] bg-black/60 px-1 rounded font-bold text-gray-300">Tema ${index+1}</span>`;
                lista.appendChild(item);
            });
        }

        function aplicarTemaFundo(imgBase64) {
            canalProjecao.postMessage({ tipo: 'MUDAR_FUNDO', payload: { imagem: imgBase64 } });
        }

        function carregarNoMeio(titulo, listaSlides) {
            slidesAtivos = listaSlides; indiceSlideAtivo = 0;
            document.getElementById('titulo-col2').innerText = titulo;
            renderizeMeio();
            disparar(slidesAtivos[indiceSlideAtivo]);
        }

        function renderizeMeio() {
            const container = document.getElementById('container-slides'); container.innerHTML = '';
            container.className = "flex-1 overflow-y-auto space-y-2 pr-1 text-left dark-scroll";
            slidesAtivos.forEach((slide, idx) => {
                const item = document.createElement('div'); const isActive = idx === indiceSlideAtivo;
                item.className = `p-4 rounded-xl cursor-pointer border transition-all ${isActive ? 'bg-emerald-500/10 border-emerald-500 text-white font-medium' : modoEscuro ? 'bg-[#29292e]/40 border-[#29292e] text-gray-300 hover:bg-[#29292e]' : 'bg-gray-50 border-gray-150 text-gray-700'}`;
                item.onclick = () => mudarSlidePara(idx);
                item.innerHTML = `<span class="text-[9px] font-bold block opacity-60 mb-1">VERSÍCULO / SLIDE ${idx + 1}</span><p class="text-sm leading-relaxed whitespace-pre-line">${slide}</p>`;
                container.appendChild(item);
            });
        }

        function mudarSlidePara(idx) {
            if (idx >= 0 && idx < slidesAtivos.length) { indiceSlideAtivo = idx; renderizeMeio(); disparar(slidesAtivos[indiceSlideAtivo]); }
        }

        window.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.key === ' ' || e.key === 'ArrowDown') { e.preventDefault(); mudarSlidePara(indiceSlideAtivo + 1); }
            if (e.key === 'ArrowUp') { e.preventDefault(); mudarSlidePara(indiceSlideAtivo - 1); }
            if (e.altKey && e.key.toLowerCase() === 'l') { e.preventDefault(); alternarF5(true); }
            if (e.altKey && e.key.toLowerCase() === 'b') { e.preventDefault(); alternarF6(true); }
            if (e.altKey && e.key.toLowerCase() === 'r') { e.preventDefault(); restaurarTelas(); }
        });

        function abrirProjetor() { window.open('?view=projection', '_blank', 'width=1280,height=720'); }
        function disparar(texto) { canalProjecao.postMessage({ tipo: 'PROJETAR_TEXTO', payload: { texto } }); }
        function alternarF5(status) { canalProjecao.postMessage({ tipo: 'F5_TEXTO', payload: { ativo: status } }); }
        function alternarF6(status) { canalProjecao.postMessage({ tipo: 'F6_BLACKOUT', payload: { ativo: status } }); }
        function restaurarTelas() { alternarF5(false); alternarF6(false); }

        function alternarTema() {
            modoEscuro = !modoEscuro;
            const corpo = document.getElementById('corpo-sistema'), header = document.getElementById('header-operador'), col1 = document.getElementById('col1'), col2 = document.getElementById('col2'), cardCtrl = document.getElementById('card-controles'), btn = document.getElementById('btn-tema');
            if (modoEscuro) {
                corpo.className = "bg-[#121214] text-white transition-colors duration-300";
                header.className = "px-6 py-3 flex justify-between items-center border-b bg-[#1f1f23] border-[#29292e]";
                col1.className = "col-span-4 rounded-2xl p-4 border bg-[#1f1f23] border-[#29292e] flex flex-col gap-3";
                col2.className = "col-span-5 rounded-2xl p-4 border bg-[#1f1f23] border-[#29292e] flex flex-col gap-3";
                cardCtrl.className = "rounded-2xl p-3 border bg-[#1f1f23] border-[#29292e]";
                btn.innerText = "☀️ Modo Claro";
            } else {
                corpo.className = "bg-[#f0f2f5] text-[#1c1c1e] transition-colors duration-300";
                header.className = "px-6 py-3 flex justify-between items-center border-b bg-white border-gray-200";
                col1.className = "col-span-4 rounded-2xl p-4 border bg-white border-gray-200 flex flex-col gap-3";
                col2.className = "col-span-5 rounded-2xl p-4 border bg-white border-gray-200 flex flex-col gap-3";
                cardCtrl.className = "rounded-2xl p-3 border bg-white border-gray-200";
                btn.innerText = "🌙 Modo Escuro";
            }
            renderizeMeio();
        }
    </script>
</body>
</html>
